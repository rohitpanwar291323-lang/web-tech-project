<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Simple modern to-do list"/>
  <title>TO DO LIST</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>

  <div class="container">
    <header class="header">
      <div class="title-area">
        <h1>TO DO LIST</h1>
        <p class="tagline">Don't forget to do your tasks!</p>
      </div>

      <div class="stats">
        <div class="progress-container">
          <div id="progressBar" class="progress-bar">
            <div id="progress" class="progress-fill" style="width: 0%;"></div>
          </div>
        </div>
        <div class="counter">
          <strong id="numbers">0</strong> / <span id="total">0</span>
          <span class="done-text">done</span>
        </div>
      </div>
    </header>
    <form id="taskForm" class="add-task-form">
      <div class="input-row">
        <input
          type="text"
          id="taskInput"
          placeholder="What needs to be done?"
          autocomplete="off"
          autofocus
          required
        >

        <input
          type="date"
          id="dueDate"
          title="Due date (optional)"
        >

        <select id="priority" title="Priority level">
          <option value="" disabled selected>Priority</option>
          <option value="high">High</option>
          <option value="medium">Medium</option>
          <option value="low">Low</option>
        </select>

        <button type="submit" aria-label="Add task">+</button>
      </div>
    </form>

    <div class="filters">
      <button type="button" class="filter-btn active" data-filter="all">All</button>
      <button type="button" class="filter-btn" data-filter="active">Active</button>
      <button type="button" class="filter-btn" data-filter="completed">Done</button>
      <button type="button" class="clear-completed" data-action="clear">Clear completed</button>
    </div>
    <ul class="task-list" id="taskList"></ul>
    <div class="empty-state" id="emptyState">
      <div class="empty-emoji">📋✨</div>
      <p>No tasks yet</p>
      <small>Add your first task above</small>
    </div>

  </div>

  <script src="./app.js" defer></script>
</body>
</html>
